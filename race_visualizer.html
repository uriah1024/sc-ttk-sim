<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: transparent; color: white; margin: 0; padding: 10px; }
        .controls { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; }
        #timeSlider { flex-grow: 1; cursor: pointer; }
        .time-display { font-size: 1.2em; font-weight: bold; font-family: monospace; min-width: 80px; text-align: right; }
        .track-container { display: flex; flex-direction: column; gap: 10px; }
        .lane { position: relative; height: 60px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; display: flex; align-items: center; padding-left: 10px; }
        .lane-bg-lines { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 10% 100%; pointer-events: none; }
        .ship-marker { position: absolute; top: 10px; height: 40px; background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%); border-left: 3px solid #4facfe; box-shadow: 0 0 10px rgba(79, 172, 254, 0.5); border-radius: 0 20px 20px 0; transition: left 0.05s linear, width 0.05s linear; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; white-space: nowrap; overflow: hidden; }
        .ship-label { z-index: 2; font-weight: bold; text-shadow: 1px 1px 2px black; }
        .stats-label { z-index: 2; font-family: monospace; font-size: 0.9em; color: #a8c0ff; margin-left: 10px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div class="controls">
        <label for="timeSlider">Time (Seconds):</label>
        <input type="range" id="timeSlider" min="0" step="0.1" value="0">
        <div class="time-display" id="timeDisplay">0.0s</div>
    </div>
    <div class="track-container" id="tracks"></div>

    </body>
</html>
