<!DOCTYPE html>
<html>
<head>
    <title>SC Aim Trainer PoC</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; cursor: none; }
        #gameCanvas { width: 100vw; height: 750px; display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 750px; pointer-events: none; overflow: hidden; }
        
        /* The SVG Tether */
        #tether-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 750px; z-index: 1; }
        
        /* The UI Lead PIP (Constant Size) */
        #ui-pip { position: absolute; width: 14px; height: 14px; border: 2px solid #00ff00; border-radius: 50%; transform: translate(-50%, -50%); display: none; z-index: 5; transition: border-color 0.1s, background-color 0.1s; }
        
        /* The ESP Bubble */
        #esp-bubble { position: absolute; width: 160px; height: 160px; border: 1px dashed rgba(0, 255, 255, 0.2); border-radius: 50%; transform: translate(-50%, -50%); display: none; z-index: 4; transition: border-color 0.1s; }
        
        /* Dynamic Crosshair */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #ffffff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px #00aaff; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.7); }
        #crosshair::before { top: -14px; left: 1px; width: 2px; height: 30px; }
        #crosshair::after { left: -14px; top: 1px; height: 2px; width: 30px; }
        
        /* Status Bars */
        .hud-box { position: absolute; bottom: 30px; left: 30px; background: rgba(0, 15, 30, 0.7); padding: 15px; border: 1px solid #4facfe; border-radius: 5px; color: white; width: 250px; z-index: 10; }
        .target-box { position: absolute; top: 30px; right: 30px; background: rgba(30, 0, 0, 0.7); padding: 15px; border: 1px solid #ff4b4b; border-radius: 5px; color: white; width: 250px; text-align: right; z-index: 10; }
        
        .bar-bg { width: 100%; height: 10px; background: #222; margin-top: 5px; margin-bottom: 10px; }
        #cap-bar { height: 100%; background: #4facfe; width: 100%; transition: width 0.05s; }
        #shield-bar { height: 100%; background: #00ffcc; width: 100%; transition: width 0.1s; }
        #armor-bar { height: 100%; background: #ffaa00; width: 100%; transition: width 0.1s; }
        
        .controls-info { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #4facfe; font-size: 14px; font-weight: bold; text-shadow: 0 0 4px #000; z-index: 10; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui-layer">
    <svg id="tether-layer">
        <line id="tether-line" x1="50%" y1="50%" x2="50%" y2="50%" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="4 4" />
    </svg>
    <div id="esp-bubble"></div>
    <div id="ui-pip"></div>
    <div id="crosshair"></div>
    
    <div class="hud-box">
        <div>Gladius Systems</div>
        <div style="font-size: 12px; color: #aaa;">Speed: <span id="speed-txt">0</span> m/s</div>
        <div style="margin-top: 10px; font-size: 12px;">Capacitor: <span id="cap-txt">75</span> / 75</div>
        <div class="bar-bg"><div id="cap-bar"></div></div>
    </div>
    <div class="target-box">
        <div>Target Drone</div>
        <div style="font-size: 12px; color: #aaa;">Distance: <span id="dist-txt">1000</span> m</div>
        <div style="margin-top: 10px; font-size: 12px;">Shields</div>
        <div class="bar-bg"><div id="shield-bar"></div></div>
        <div style="font-size: 12px;">Armor</div>
        <div class="bar-bg"><div id="armor-bar"></div></div>
    </div>
    <div class="controls-info">Interactive Mode: Move mouse to aim. ESP Dampening & Magnetism active inside PIP bubble.</div>
</div>

<canvas id="gameCanvas"></canvas>

</body>
</html>
